<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Strength + Pilates Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#fdf6f0;font-family:Georgia,serif;color:#3d2b24;padding-bottom:80px;font-size:15px}
.hdr{background:linear-gradient(135deg,#c9a99a,#e8d5cc);padding:50px 18px 16px;text-align:center}
.hdr h1{font-size:1.2rem;color:#fff;font-weight:bold}
.hdr p{font-size:0.72rem;color:rgba(255,255,255,0.85);margin-top:3px}
.tab{display:none}.tab.on{display:block}
.card{background:#fff9f5;border-radius:13px;border:1px solid #ecddd8;margin:12px 13px;padding:15px}
.stitle{font-size:0.62rem;font-weight:bold;letter-spacing:1.4px;text-transform:uppercase;color:#9c7b72;margin-bottom:10px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:7px 13px;border-radius:20px;border:1.5px solid #ecddd8;background:#fff;color:#9c7b72;cursor:pointer;font-size:0.76rem;font-family:Georgia,serif}
.pill.on{background:#c9a99a;color:#fff;border-color:#c9a99a;font-weight:bold}
.pill.sm{font-size:0.68rem;padding:5px 10px}
.pbar{height:6px;border-radius:4px;background:#ecddd8;margin-top:10px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#c9a99a,#e8d5cc);border-radius:4px;transition:width .3s}
.plbl{font-size:0.63rem;color:#9c7b72;margin-top:3px}
.crow{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid #ecddd8}
.crow:last-child{border-bottom:none}
.crow input[type=checkbox]{width:20px;height:20px;accent-color:#c9a99a;flex-shrink:0;margin-top:1px;cursor:pointer}
.clbl{font-size:0.82rem;flex:1}
/* Exercise block */
.exblock{border-bottom:1px solid #ecddd8;padding:12px 0}
.exblock:last-child{border-bottom:none}
.exname{font-weight:bold;font-size:0.84rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.exname-tap{cursor:pointer;border-bottom:1px dotted #c9a99a}
.exinfo{font-size:0.62rem;color:#c9a99a;margin-left:3px}
.exmeta{font-size:0.68rem;color:#9c7b72;margin-bottom:2px}
.exnote{font-size:0.68rem;color:#d4a0a0;font-style:italic;margin-bottom:6px}
.lbadge{background:#d4a0a0;color:#fff;border-radius:5px;padding:1px 6px;font-size:0.6rem;font-weight:bold;white-space:nowrap}
.rbadge{background:#9c7b72;color:#fff;border-radius:5px;padding:1px 6px;font-size:0.6rem;font-weight:bold;white-space:nowrap}
.sbadge{font-size:0.62rem;color:#9c7b72;margin-left:auto;white-space:nowrap}
/* Superset / triset group */
.ssgroup{border:1.5px solid #e6d3cc;border-radius:11px;background:#fdf3ef;padding:2px 11px;margin:12px 0}
.sshead{font-size:0.64rem;font-weight:bold;letter-spacing:1.2px;text-transform:uppercase;color:#b8887a;padding:9px 0 1px}
.sshint{font-size:0.63rem;color:#9c7b72;margin-bottom:2px}
.swapsel{font-family:Georgia,serif;font-size:0.7rem;color:#9c7b72;background:#fff;border:1.5px solid #ecddd8;border-radius:14px;padding:4px 8px;margin-bottom:7px;max-width:100%}
/* Overload hint */
.ovhint{font-size:0.67rem;color:#5f7d57;background:#eef4ea;border-radius:7px;padding:5px 9px;margin-bottom:7px;line-height:1.4}
.ovhint.ovnone{color:#9c7b72;background:#f5efe9}
.ovhint.ovtone{color:#9c6f8a;background:#f6eef3}
.ovhint b{color:#3d2b24}
/* Set rows table */
.set-table{width:100%;border-collapse:collapse}
.set-table th{font-size:0.6rem;color:#9c7b72;font-weight:bold;padding:3px 4px;text-align:left;border-bottom:1px solid #ecddd8;font-family:Georgia,serif}
.set-table td{padding:4px 3px;vertical-align:middle}
.set-num{font-size:0.7rem;font-weight:bold;color:#9c7b72;width:22px}
.set-input{border:1px solid #ecddd8;border-radius:7px;padding:6px 5px;font-size:0.8rem;background:#fff;color:#3d2b24;font-family:Georgia,serif;width:100%}
.leg-section{margin-top:8px}
.leg-label{font-size:0.7rem;font-weight:bold;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.fsec{margin-bottom:13px}
.flbl{font-size:0.74rem;font-weight:bold;margin-bottom:6px}
.frow{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:6px 12px;border-radius:15px;border:1.5px solid #ecddd8;background:#fff;color:#9c7b72;cursor:pointer;font-size:0.73rem;font-family:Georgia,serif}
.fbtn.sn{background:#c9a99a;color:#fff;border-color:#c9a99a}
.fbtn.sw{background:#c47a7a;color:#fff;border-color:#c47a7a}
textarea{width:100%;border:1px solid #ecddd8;border-radius:9px;padding:8px 10px;font-size:0.78rem;font-family:Georgia,serif;background:#fff;color:#3d2b24;resize:vertical;min-height:60px}
.sbtn{width:100%;padding:12px;border-radius:22px;background:#c9a99a;color:#fff;border:none;font-size:0.88rem;font-family:Georgia,serif;font-weight:bold;cursor:pointer;margin-top:11px}
.sbtn.alt{background:#fff;color:#9c7b72;border:1.5px solid #ecddd8;font-size:0.8rem;padding:10px;margin-top:8px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ecddd8;display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:99}
.nbtn{flex:1;padding:9px 1px 7px;background:none;border:none;cursor:pointer;font-family:Georgia,serif;font-size:0.54rem;color:#9c7b72;display:flex;flex-direction:column;align-items:center;gap:2px}
.nbtn.on{color:#c9a99a;font-weight:bold}
.nbtn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2}
.dgrid{display:flex;gap:3px;margin-bottom:8px}
.dcell{flex:1;padding:8px 2px;border-radius:9px;text-align:center;border:1.5px solid #ecddd8;background:#fff}
.dcell.on{background:#c9a99a;border-color:#c9a99a}
.dcell.rest{background:#ecddd8}
.dname{font-size:0.6rem;font-weight:bold;color:#9c7b72}
.dcell.on .dname{color:#fff}
.dsess{font-size:0.53rem;color:#9c7b72;margin-top:2px}
.dcell.on .dsess{color:rgba(255,255,255,0.85)}
.prow{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid #ecddd8;align-items:flex-start}
.prow:last-child{border-bottom:none}
.frow2{padding:8px 0;border-bottom:1px solid #ecddd8}
.frow2:last-child{border-bottom:none}
.fcond{font-size:0.76rem;font-weight:bold;color:#c47a7a}
.fact{font-size:0.72rem;color:#9c7b72;margin-top:3px}
.srow{display:flex;gap:9px;margin:0 13px 4px}
.sc{background:#fff9f5;border-radius:10px;border:1px solid #ecddd8;padding:12px 13px;flex:1}
.snum{font-size:1.5rem;font-weight:bold;color:#c9a99a}
.slbl{font-size:0.64rem;color:#9c7b72;margin-top:1px}
.htags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.htag{font-size:0.6rem;background:#ecddd8;border-radius:7px;padding:2px 7px}
.hnote{font-size:0.72rem;color:#9c7b72;font-style:italic;margin-top:5px}
.hlogs{margin-top:7px}
.hlog{font-size:0.7rem;padding:2px 0;border-bottom:1px solid #ecddd8}
.hlog:last-child{border-bottom:none}
.hlog-name{font-weight:bold;font-size:0.72rem}
.hlog-sets{font-size:0.68rem;color:#9c7b72;margin-top:1px}
.empty{text-align:center;color:#9c7b72;font-size:0.84rem;padding:36px 20px}
.setrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #ecddd8}
.setrow:last-child{border-bottom:none}
.setlbl{font-weight:bold;font-size:0.84rem}
.setsub{font-size:0.68rem;color:#9c7b72;margin-top:2px}
.tgl{padding:6px 14px;border-radius:15px;border:1.5px solid #ecddd8;background:#fff;color:#9c7b72;font-family:Georgia,serif;font-size:0.76rem;cursor:pointer}
.tgl.on{background:#c9a99a;color:#fff;border-color:#c9a99a;font-weight:bold}
.rrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #ecddd8;font-size:0.77rem}
.rrow:last-child{border-bottom:none}
.deload-banner{background:linear-gradient(135deg,#f0d5cc,#e8d5cc);border-radius:9px;padding:9px 13px;margin:12px 13px 0;font-size:0.76rem;font-weight:bold;color:#3d2b24;text-align:center}
.opthdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sfocus{font-size:0.72rem;color:#9c7b72;margin-top:7px}
/* Library */
.librow{display:flex;align-items:center;gap:8px;padding:11px 0;border-bottom:1px solid #ecddd8;cursor:pointer}
.librow:last-child{border-bottom:none}
.libtxt{flex:1}
.libname{font-weight:bold;font-size:0.82rem}
.libmus{font-size:0.66rem;color:#9c7b72;margin-top:1px}
.libchev{color:#c9a99a;font-size:1.2rem}
/* Exercise detail modal */
.exmodal{display:none;position:fixed;inset:0;background:rgba(61,43,36,0.55);z-index:200;align-items:flex-end;justify-content:center}
.exmodal.on{display:flex}
.exmodal-box{background:#fdf6f0;border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:86vh;overflow-y:auto;padding:20px 18px 44px;position:relative}
.exmodal-x{position:absolute;top:10px;right:13px;background:none;border:none;font-size:1.7rem;color:#9c7b72;cursor:pointer;line-height:1;font-family:Georgia,serif}
.exm-title{font-size:1.05rem;font-weight:bold;margin-bottom:2px;padding-right:30px}
.exm-muscle{font-size:0.72rem;color:#c47a7a;font-weight:bold;margin-bottom:12px}
.exm-sec{margin-bottom:14px}
.exm-h{font-size:0.62rem;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:#9c7b72;margin-bottom:4px;margin-top:8px}
.exm-t{font-size:0.82rem;line-height:1.5}
.exm-prow{display:flex;justify-content:space-between;font-size:0.74rem;padding:5px 0;border-bottom:1px solid #ecddd8;gap:10px}
.exm-prow:last-child{border-bottom:none}
.exm-pd{color:#9c7b72;white-space:nowrap}
.exm-ps{text-align:right}
.impexp-ta{width:100%;min-height:64px;font-family:monospace;font-size:0.62rem;margin-top:8px}
/* Calendar */
.calhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calmonth{font-size:1rem;font-weight:bold}
.calarw{background:none;border:1.5px solid #ecddd8;border-radius:50%;width:32px;height:32px;font-size:1.1rem;cursor:pointer;color:#3d2b24;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;line-height:1}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.calday-name{text-align:center;font-size:0.58rem;font-weight:bold;color:#9c7b72;padding:4px 0}
.calday{min-height:38px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.75rem;cursor:pointer;border:1.5px solid transparent;padding:3px 1px}
.calday.empty-cell{cursor:default;background:transparent}
.calday.is-today{border-color:#c9a99a;font-weight:bold}
.calday.has-sess{background:#f5e6e0}
.calday.is-sel{background:#e8d5cc;border-color:#c9a99a}
.calday-num{font-size:0.78rem}
.calday-dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:0.66rem;color:#9c7b72}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cal-detail{margin-top:12px;padding-top:12px;border-top:1px solid #ecddd8}
.cal-detail-date{font-size:0.72rem;color:#9c7b72;margin-bottom:6px}
.cal-sess-pill{display:inline-block;color:#fff;border-radius:8px;padding:3px 10px;font-size:0.74rem;margin:2px 3px 2px 0}
.streak-card{background:linear-gradient(135deg,#f5e6e0,#fff9f5);border-radius:11px;border:1px solid #ecddd8;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.streak-num{font-size:1.8rem;font-weight:bold;color:#c9a99a}
.streak-lbl{font-size:0.65rem;color:#9c7b72;margin-top:1px}
.wk-summary{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px}
.wk-cell{text-align:center;padding:6px 2px;border-radius:7px;background:#f0ebe8}
.wk-cell.done{background:#c9a99a}
.wk-cell-d{font-size:0.58rem;color:#9c7b72;font-weight:bold}
.wk-cell.done .wk-cell-d{color:rgba(255,255,255,0.9)}
.wk-cell-s{font-size:0.5rem;color:#9c7b72;margin-top:2px}
.wk-cell.done .wk-cell-s{color:rgba(255,255,255,0.85)}
</style>
</head>
<body>
<div class="hdr">
  <h1>&#128170; Strength + Pilates</h1>
  <p id="hsub">Lean &amp; Tone &middot; Pilates Hybrid &middot; 5-Day Split</p>
</div>
<div id="t-today" class="tab on"></div>
<div id="t-split" class="tab"></div>
<div id="t-calendar" class="tab"></div>
<div id="t-library" class="tab"></div>
<div id="t-history" class="tab"></div>
<div id="t-settings" class="tab"></div>
<nav class="bnav">
  <button class="nbtn on" id="nb-today" onclick="goTab('today')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Today
  </button>
  <button class="nbtn" id="nb-split" onclick="goTab('split')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Split
  </button>
  <button class="nbtn" id="nb-calendar" onclick="goTab('calendar')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14" stroke-width="3"/><line x1="12" y1="14" x2="12" y2="14" stroke-width="3"/><line x1="16" y1="14" x2="16" y2="14" stroke-width="3"/></svg>Calendar
  </button>
  <button class="nbtn" id="nb-library" onclick="goTab('library')">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Library
  </button>
  <button class="nbtn" id="nb-history" onclick="goTab('history')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>History
  </button>
  <button class="nbtn" id="nb-settings" onclick="goTab('settings')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings
  </button>
</nav>
<div id="exModal" class="exmodal" onclick="if(event.target===this)closeExDetail()">
  <div class="exmodal-box"><button class="exmodal-x" onclick="closeExDetail()">&times;</button><div id="exModalBody"></div></div>
</div>
<script>
// bilateral = logs one set of rows shared for both legs
// unilateral = logs separate left/right leg rows
// sets = number of set rows to show
var DATA = {
  "Upper A":{
    focus:"Chest, shoulders, triceps, core — lean & tone, higher reps, short rest",
    warmup:[
      {name:"Dumbbell Lateral Raises",note:"3 × 20 · light"},
      {name:"Reverse Flys",note:"3 × 20 · light"},
      {name:"Overhead Press",note:"3 × 20 · light"},
      {name:"Band Pull-Aparts",note:"3 × 20"}
    ],
    strength:[
      {id:"ua1",name:"Dumbbell Chest Press",sets:3,reps:"12-15",rest:"45s",note:"Lighter than before — smooth, controlled reps",grp:"A"},
      {id:"ua2",name:"Single-Arm Dumbbell Rows",sets:3,reps:"12-15",rest:"45s",left:1,note:"Left arm first each set · controlled tempo",uni:1,grp:"A"},
      {id:"ua3",name:"Incline Push-ups",sets:3,reps:"12-15",rest:"30s",tone:1,grp:"B"},
      {id:"ua4",name:"Overhead Press",sets:3,reps:"15",rest:"30s",tone:1,grp:"B"},
      {id:"ua5",name:"Lateral Raises",sets:3,reps:"15-20",rest:"30s",tone:1,grp:"C"},
      {id:"ua6",name:"Tricep Dips",sets:3,reps:"12-15",rest:"30s",tone:1,grp:"C"},
      {id:"ua7",name:"Bicep Curls",sets:3,reps:"15-20",rest:"30s",tone:1,grp:"C"}
    ],
    opt:[
      {id:"ua8",name:"Overhead Tricep Extension",sets:2,reps:"15-20",tone:1},
      {id:"ua9",name:"Concentration Curls",sets:2,reps:"15-20",uni:1,left:1,tone:1,note:"Left arm first"}
    ]
  },
  "Upper B":{
    focus:"Back, rear shoulders, arms, rotational core — lean & tone, higher reps",
    warmup:[
      {name:"Reverse Flys",note:"3 × 20 · light"},
      {name:"Face Pulls",note:"3 × 20 · light"},
      {name:"Band Pull-Aparts",note:"3 × 20"},
      {name:"Prone Y-Raises",note:"3 × 15 · light"}
    ],
    strength:[
      {id:"ub1",name:"Barbell / Dumbbell Deadlift",sets:3,reps:"10-12",rest:"75s",note:"Lighter, higher reps — hinge for a long stretch, no grinding"},
      {id:"ub10",name:"Seated Single-Arm Cable Row",sets:3,reps:"12-15",rest:"45s",left:1,note:"Left arm first each set · controlled, full range",uni:1,grp:"A",alts:[
        {id:"ub2",name:"Prone Single-Arm Dumbbell Rows",sets:3,reps:"12-15",rest:"45s",left:1,note:"Left arm first each set",uni:1},
        {id:"ub11",name:"Chest-Supported Row",sets:3,reps:"12-15",rest:"45s"}
      ]},
      {id:"ub3",name:"Assisted Pull-ups / Lat Pulldowns",sets:3,reps:"10-12",rest:"45s",grp:"A"},
      {id:"ub4",name:"Face Pulls",sets:3,reps:"15-20",rest:"30s",tone:1,grp:"B"},
      {id:"ub5",name:"Y-Raises",sets:3,reps:"15-20",rest:"30s",tone:1,grp:"B"},
      {id:"ub8",name:"Overhead Tricep Extension",sets:3,reps:"15",rest:"30s",tone:1,grp:"C"},
      {id:"ub9",name:"Hammer Curls",sets:3,reps:"15",rest:"30s",tone:1,grp:"C"}
    ],
    opt:[
      {id:"ub6",name:"Single-Arm Farmer Carry",sets:3,reps:"40 steps",uni:1,tone:1},
      {id:"ub7",name:"Reverse Flyes",sets:3,reps:"15-20",tone:1}
    ]
  },
  "Lower A":{
    focus:"Glutes, thighs & hips — Pilates-circuit sculpt: light load, high reps, lengthen",
    warmup:[
      {name:"Glute Bridges",note:"3 × 20"},
      {name:"Banded Lateral Walks",note:"3 × 20 steps each way"},
      {name:"Bodyweight Squats",note:"3 × 15 · slow tempo"},
      {name:"Clamshells",note:"3 × 20 each · light band"}
    ],
    strength:[
      {id:"la10",name:"Glute Bridge March",sets:3,reps:"20-25 slow",rest:"30s",tone:1,note:"Bodyweight or light · drive through the heels, ribs down, no lower-back arch",grp:"A",alts:[
        {id:"x_hip_thrust",name:"Hip Thrust",sets:3,reps:"15-20",rest:"45s",note:"If you want a little more load — still controlled, no grinding"}
      ]},

var SP={4:["Upper A","Lower A","Upper B","Lower B"],5:["Upper A","Lower A","Upper B","Lower B","Cardio"],6:["Upper A","Lower A","Upper B","Lower B","Upper A","Cardio"]};
var DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var MNAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
var SMON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var CMAP={"Upper A":"#c9a99a","Upper B":"#b8887a","Lower A":"#88a880","Lower B":"#6b9068","Cardio":"#d0a24e"};

// id -> name map (built from every strength/opt exercise) so old history,
// which stores logs by exercise id, resolves to a movement name.
var ID2NAME={};
(function(){
  var dk=Object.keys(DATA);
  for(var i=0;i<dk.length;i++){
    var s=DATA[dk[i]];
    ["strength","opt"].forEach(function(f){
      if(s[f])for(var j=0;j<s[f].length;j++){
        var ex=s[f][j]; ID2NAME[ex.id]=ex.name;
        if(ex.alts)for(var a=0;a<ex.alts.length;a++)ID2NAME[ex.alts[a].id]=ex.alts[a].name;
      }
    });
  }
})();
// Movements retired from the program (legacy ids) so older logged history
// still resolves to a readable name in the History tab and progress views.
var LEGACY={la1:"Goblet Squats",la4:"Reverse Lunges",la5:"Step-ups",la8:"Sumo Goblet Squat"};
(function(){for(var k in LEGACY)if(!ID2NAME[k])ID2NAME[k]=LEGACY[k];})();
// Normalized name index into LIB
var LIBIDX={};
(function(){var ks=Object.keys(LIB);for(var i=0;i<ks.length;i++)LIBIDX[normName(ks[i])]=LIB[ks[i]];})();
// Register every library-suggested alternative under its slug id so swapped logs
// and history resolve back to a movement name.
(function(){
  var dk=Object.keys(DATA);
  for(var i=0;i<dk.length;i++){
    var s=DATA[dk[i]];
    ["strength","opt"].forEach(function(f){
      if(!s[f])return;
      for(var j=0;j<s[f].length;j++){
        var lib=LIBIDX[normName(s[f][j].name)];
        if(lib&&lib.alts)for(var a=0;a<lib.alts.length;a++)ID2NAME[slug(lib.alts[a])]=lib.alts[a];
      }
    });
  }
})();

var S={sess:"Upper A",split:5,deload:false,opt:false,logs:{},checks:{},feels:{},notes:{},hist:[],swaps:{},caly:new Date().getFullYear(),calm:new Date().getMonth(),calsel:null};
(function(){
  try{var x=localStorage.getItem("spt3");if(x){var p=JSON.parse(x);S.sess=p.sess||S.sess;S.split=p.split||S.split;S.deload=p.deload||false;S.opt=false;S.logs=p.logs||{};S.checks=p.checks||{};S.feels=p.feels||{};S.notes=p.notes||{};S.hist=p.hist||[];S.swaps=p.swaps||{};}}catch(e){}
})();

function td(){return new Date().toISOString().slice(0,10);}
function csk(){return S.sess+"_"+td();}
function sv(){try{localStorage.setItem("spt3",JSON.stringify({sess:S.sess,split:S.split,deload:S.deload,logs:S.logs,checks:S.checks,feels:S.feels,notes:S.notes,hist:S.hist,swaps:S.swaps}));}catch(e){}}
// Build the full swap menu for a slot: the default exercise, any curated
// alternatives (full objects, with real ids for history continuity), then the
// library's suggested alternatives (by name, inheriting the slot's set scheme).
function slug(name){return "x_"+normName(name).replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");}
function getSwapOptions(e){
  var opts=[e]; var seen={}; seen[normName(e.name)]=1;
  if(e.alts)for(var i=0;i<e.alts.length;i++){var a=e.alts[i];if(seen[normName(a.name)])continue;seen[normName(a.name)]=1;opts.push(a);}
  var lib=libFor(e.name);
  if(lib&&lib.alts)for(var j=0;j<lib.alts.length;j++){
    var nm=lib.alts[j]; if(seen[normName(nm)])continue; seen[normName(nm)]=1;
    opts.push({id:slug(nm),name:nm,sets:e.sets,reps:e.reps,rest:e.rest,uni:e.uni,left:e.left,note:e.note,tone:e.tone});
  }
  return opts;
}
// Resolve an exercise to the alternative the user has swapped in (sticky per session-type)
function resolveSwap(e){
  var sel=S.swaps[S.sess+"_"+e.id];
  if(!sel||sel==="default")return e;
  var opts=getSwapOptions(e);
  for(var i=0;i<opts.length;i++)if(opts[i].id===sel)return opts[i];
  return e;
}
function pad2(n){return n<10?"0"+n:String(n);}
function normName(s){return String(s).toLowerCase().replace(/\s+/g," ").trim();}
function isCardio(s){return !!(s.cardio||s.abs);}
function libFor(name){return LIBIDX[normName(name)]||null;}
function fmtDate(iso){var p=String(iso).split("-");return parseInt(p[2],10)+" "+SMON[parseInt(p[1],10)-1];}
function subtitle(){return "Lean & Tone · Pilates Hybrid · "+S.split+"-Day Split"+(S.deload?" · DELOAD":"");}

// ---- Progressive overload: match a movement by name across all history ----
function eachMatch(name, side, cb){
  var nn=normName(name);
  for(var i=0;i<S.hist.length;i++){
    var e=S.hist[i]; if(!e.logs)continue;
    var keys=Object.keys(e.logs);
    for(var j=0;j<keys.length;j++){
      var lk=keys[j], ls=null, id=lk;
      if(lk.slice(-2)==="_L"||lk.slice(-2)==="_R"){ls=lk.slice(-1);id=lk.slice(0,-2);}
      if(side){if(ls!==side)continue;}else{if(ls)continue;}
      var nm=ID2NAME[id]; if(!nm||normName(nm)!==nn)continue;
      if(cb(e,e.logs[lk]))return;
    }
  }
}
function lastForName(name,side){
  var res=null;
  eachMatch(name,side,function(e,sets){
    for(var s=0;s<sets.length;s++){if(sets[s]&&(sets[s].w||sets[s].r)){res={date:e.date,sess:e.sess,sets:sets};return true;}}
    return false;
  });
  return res;
}
function bestForName(name,side){
  var best=null;
  eachMatch(name,side,function(e,sets){
    for(var s=0;s<sets.length;s++){var sd=sets[s];if(sd&&sd.w){var w=parseFloat(sd.w);if(!isNaN(w)&&(!best||w>best.w))best={w:w,r:sd.r};}}
    return false;
  });
  return best;
}
function histForName(name,side){
  var out=[];
  eachMatch(name,side,function(e,sets){
    for(var s=0;s<sets.length;s++){if(sets[s]&&(sets[s].w||sets[s].r)){out.push({date:e.date,sess:e.sess,sets:sets});break;}}
    return false;
  });
  return out;
}
function fmtSets(sets){
  var a=[];
  for(var i=0;i<sets.length;i++){var sd=sets[i];if(sd&&(sd.w||sd.r))a.push((sd.w?sd.w+"kg":"-")+(sd.r?"×"+sd.r:""));}
  return a.join(" &middot; ");
}
function ovHint(name,side,tone){
  var last=lastForName(name,side);
  if(!last){
    return tone
      ? '<div class="ovhint ovtone">&#10047; Tone &amp; lengthen — keep it light, slow the tempo, chase reps not weight</div>'
      : '<div class="ovhint ovnone">No previous data yet — log your first set to start tracking</div>';
  }
  var when=fmtDate(last.date)+(last.sess!==S.sess?", "+last.sess:"");
  if(tone){
    // Toning work: surface reps/endurance, not load — so the app stops nudging toward bulk
    return '<div class="ovhint ovtone">&#10047; <b>Last</b> ('+when+'): '+fmtSets(last.sets)+' &nbsp;&middot;&nbsp; add reps or slow the tempo before adding load</div>';
  }
  var best=bestForName(name,side);
  var h='<div class="ovhint"><b>Last</b> ('+when+'): '+fmtSets(last.sets);
  if(best&&best.w)h+=' &nbsp;&middot;&nbsp; <b>Best</b> '+best.w+'kg'+(best.r?'×'+best.r:'');
  h+='</div>';
  return h;
}

function goTab(name){
  var tabs=["today","split","calendar","library","history","settings"];
  for(var i=0;i<tabs.length;i++){
    document.getElementById("t-"+tabs[i]).className="tab"+(tabs[i]===name?" on":"");
    document.getElementById("nb-"+tabs[i]).className="nbtn"+(tabs[i]===name?" on":"");
  }
  if(name==="today")rToday();
  else if(name==="split")rSplit();
  else if(name==="calendar")rCal();
  else if(name==="library")rLibrary();
  else if(name==="history")rHist();
  else rSet();
}

function calcPct(){
  var s=DATA[S.sess]; var k=csk(); var done=0, total=0;
  if(s.warmup){for(var i=0;i<s.warmup.length;i++){total++;if(S.checks[k+"_wu"+i])done++;}}
  if(isCardio(s)){
    ["cardio","abs"].forEach(function(f){
      if(s[f])for(var i=0;i<s[f].length;i++){total++;if(S.checks[k+"_"+s[f][i].id])done++;}
    });
  } else {
    var ex=s.strength.concat(S.opt?s.opt:[]);
    for(var i=0;i<ex.length;i++){
      var e=resolveSwap(ex[i]);
      if(e.uni){
        total++;
        var dl=S.logs[k]&&S.logs[k][e.id+"_L"];
        var dr=S.logs[k]&&S.logs[k][e.id+"_R"];
        if(dl&&dl[0]&&(dl[0].w||dl[0].r))done+=0.5;
        if(dr&&dr[0]&&(dr[0].w||dr[0].r))done+=0.5;
      } else {
        total++;
        var d=S.logs[k]&&S.logs[k][e.id];
        if(d&&d[0]&&(d[0].w||d[0].r))done++;
      }
    }
  }
  return total?Math.round(done/total*100):0;
}
function updPct(){
  var p=calcPct();
  var f=document.getElementById("pfill");var l=document.getElementById("plbl");
  if(f)f.style.width=p+"%";if(l)l.textContent="Session progress: "+p+"%";
}

// Build set rows for an exercise
function buildSetRows(exId, sets, side){
  var k=csk();
  var logKey=side?exId+"_"+side:exId;
  if(!S.logs[k])S.logs[k]={};
  if(!S.logs[k][logKey])S.logs[k][logKey]=[];
  var h='<table class="set-table"><thead><tr><th>Set</th><th>kg</th><th>Reps</th><th>Note</th></tr></thead><tbody>';
  for(var s=0;s<sets;s++){
    var sd=S.logs[k][logKey][s]||{};
    var wv=sd.w||""; var rv=sd.r||""; var nv=sd.n||"";
    var sid=side?side:"B";
    h+='<tr>';
    h+='<td class="set-num">'+(s+1)+'</td>';
    h+='<td><input class="set-input" type="number" inputmode="decimal" placeholder="-" value="'+wv+'" onchange="setLg(\''+exId+'\',\''+sid+'\','+s+',\'w\',this.value)"/></td>';
    h+='<td><input class="set-input" type="number" inputmode="numeric" placeholder="-" value="'+rv+'" onchange="setLg(\''+exId+'\',\''+sid+'\','+s+',\'r\',this.value)"/></td>';
    h+='<td><input class="set-input" type="text" placeholder="-" value="'+nv+'" onchange="setLg(\''+exId+'\',\''+sid+'\','+s+',\'n\',this.value)" style="width:70px"/></td>';
    h+='</tr>';
  }
  h+='</tbody></table>';
  return h;
}

function nameTap(name){return '<span class="exname-tap" onclick="openExDetail(\''+name+'\')">'+name+'<span class="exinfo">&#9432;</span></span>';}

// Dropdown to swap a slot for one of its alternatives
function swapSelect(slot){
  var opts=getSwapOptions(slot);
  if(opts.length<2)return "";
  var cur=S.swaps[S.sess+"_"+slot.id]||"default";
  var h='<select class="swapsel" onchange="setSwap(\''+slot.id+'\',this.value)">';
  h+='<option value="default"'+(cur==="default"?" selected":"")+'>'+slot.name+' (default)</option>';
  for(var i=1;i<opts.length;i++){var a=opts[i];h+='<option value="'+a.id+'"'+(cur===a.id?" selected":"")+'>'+a.name+'</option>';}
  h+='</select>';
  return h;
}
function setSwap(slotId,val){S.swaps[S.sess+"_"+slotId]=val;sv();rToday();}

// Render one strength slot (resolving any swap) as an exercise block
function renderEx(slot){
  var e=resolveSwap(slot);
  var h='<div class="exblock"><div class="exname">'+nameTap(e.name);
  if(e.left)h+='<span class="lbadge">&#9666; LEFT</span>';
  if(e.sets&&e.reps)h+='<span class="sbadge">'+e.sets+' sets &middot; '+e.reps+' reps</span>';
  h+='</div>';
  h+=swapSelect(slot);
  if(e.note)h+='<div class="exnote">&#8594; '+e.note+'</div>';

function saveSess(){
  var k=csk();
  var entry={date:td(),sess:S.sess,logs:S.logs[k]||{},feels:S.feels[k]||{},note:S.notes[k]||""};
  var nh=[];
  for(var i=0;i<S.hist.length;i++){if(!(S.hist[i].date===entry.date&&S.hist[i].sess===entry.sess))nh.push(S.hist[i]);}
  nh.unshift(entry);if(nh.length>200)nh=nh.slice(0,200);S.hist=nh;sv();
  var btn=document.querySelector("#t-today .sbtn");
  if(btn){btn.innerHTML="&#10003; Saved!";btn.style.background="#88a880";setTimeout(function(){btn.innerHTML="Save Session &#10003;";btn.style.background="#c9a99a";},1800);}
}

// ---- Backup / restore ----
function exportData(){
  var data=localStorage.getItem("spt3");
  if(!data)data=JSON.stringify({sess:S.sess,split:S.split,deload:S.deload,logs:S.logs,checks:S.checks,feels:S.feels,notes:S.notes,hist:S.hist});
  var ta=document.getElementById("impexp"); if(ta)ta.value=data;
  try{if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(data);}catch(e){}
  try{var a=document.createElement("a");a.href="data:application/json;charset=utf-8,"+encodeURIComponent(data);a.download="workout-backup-"+td()+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);}catch(e){}
  var btn=document.getElementById("expbtn");
  if(btn){var o=btn.textContent;btn.textContent="Copied + downloaded ✓";setTimeout(function(){btn.textContent=o;},1800);}
}
function importData(){
  var ta=document.getElementById("impexp"); if(!ta)return;
  var txt=(ta.value||"").trim();
  if(!txt){alert("Paste your backup JSON into the box first.");return;}
  var p; try{p=JSON.parse(txt);}catch(e){alert("That doesn't look like valid backup JSON.");return;}
  if(!confirm("Import this data? It will merge into what's already on this device."))return;
  var kk;
  if(p.logs)for(kk in p.logs)S.logs[kk]=p.logs[kk];
  if(p.checks)for(kk in p.checks)S.checks[kk]=p.checks[kk];
  if(p.feels)for(kk in p.feels)S.feels[kk]=p.feels[kk];
  if(p.notes)for(kk in p.notes)S.notes[kk]=p.notes[kk];
  if(p.swaps)for(kk in p.swaps)S.swaps[kk]=p.swaps[kk];
  if(typeof p.split!=="undefined"&&SP[p.split])S.split=p.split;
  if(typeof p.deload!=="undefined")S.deload=p.deload;
  if(p.hist&&p.hist.length){
    var map={}, i;
    for(i=0;i<S.hist.length;i++)map[S.hist[i].date+"|"+S.hist[i].sess]=S.hist[i];
    for(i=0;i<p.hist.length;i++){if(p.hist[i]&&p.hist[i].date)map[p.hist[i].date+"|"+p.hist[i].sess]=p.hist[i];}
    var arr=[]; for(var key in map)arr.push(map[key]);
    arr.sort(function(a,b){return a.date<b.date?1:(a.date>b.date?-1:0);});
    if(arr.length>200)arr=arr.slice(0,200);
    S.hist=arr;
  }
  sv();
  document.getElementById("hsub").textContent=subtitle();
  ta.value="";
  rSet();
  alert("Imported. Your history and logs are updated.");
}

document.getElementById("hsub").textContent=subtitle();
